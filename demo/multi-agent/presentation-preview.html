<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>EphemeralOS · Multi-Agent Control Room</title>
  <style>
    :root {
      --canvas:#f7f9fb; --surface:#fff; --surface-subtle:#f8fafc; --line:#e2e8f0;
      --line-strong:#cbd5e1; --ink:#0f172a; --muted:#64748b; --muted-2:#94a3b8;
      --blue:#2563eb; --blue-dark:#1d4ed8; --blue-soft:#eff6ff; --green:#059669;
      --green-soft:#ecfdf5; --amber:#d97706; --amber-soft:#fffbeb; --red:#dc2626;
      --red-soft:#fef2f2; --violet:#7c3aed; --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.035);
      --nav:232px; --header:72px; --radius:10px; --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }
    * { box-sizing:border-box }
    html { background:var(--canvas) }
    body { margin:0; min-width:780px; color:var(--ink); background:var(--canvas); font:14px/1.45 Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif }
    button,input,select { font:inherit }
    button,a,input,select { -webkit-tap-highlight-color:transparent }
    button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible { outline:3px solid rgba(37,99,235,.25); outline-offset:2px }
    a { color:inherit; text-decoration:none }
    svg { display:block; flex:none }
    .mono { font-family:var(--mono); font-size:.92em }
    .muted { color:var(--muted) }
    .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
    .eyebrow { color:var(--muted); font-size:11px; font-weight:750; letter-spacing:.08em; text-transform:uppercase }
    .shell { min-height:100vh }
    .sidebar { position:fixed; inset:0 auto 0 0; z-index:20; width:var(--nav); display:flex; flex-direction:column; background:#fff; border-right:1px solid var(--line) }
    .brand { height:var(--header); display:flex; align-items:center; gap:11px; padding:0 20px; border-bottom:1px solid var(--line) }
    .brand-mark { width:32px; height:32px; display:grid; place-items:center; color:#fff; background:var(--blue); border-radius:9px; box-shadow:0 5px 12px rgba(37,99,235,.22) }
    .brand-title { font-size:14px; font-weight:800; letter-spacing:-.01em }
    .brand-sub { color:var(--muted); font-size:11px; margin-top:1px }
    .nav-label { margin:22px 18px 8px; color:var(--muted-2); font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase }
    .nav { display:grid; gap:3px; padding:0 10px }
    .nav a { min-height:42px; display:flex; align-items:center; gap:11px; padding:0 10px; border-radius:7px; color:#475569; font-weight:650 }
    .nav a:hover { background:var(--surface-subtle); color:var(--ink) }
    .nav a.active { color:var(--blue); background:var(--blue-soft) }
    .nav a svg { width:18px; height:18px }
    .nav-badge { margin-left:auto; min-width:20px; padding:1px 6px; border-radius:99px; color:var(--muted); background:#eef2f6; font-size:10px; font-weight:800; text-align:center }
    .nav a.active .nav-badge { color:var(--blue); background:#dbeafe }
    .sidebar-foot { margin-top:auto; padding:16px; border-top:1px solid var(--line) }
    .target-card { padding:12px; border:1px solid var(--line); border-radius:8px; background:var(--surface-subtle) }
    .target-row { display:flex; align-items:center; gap:7px; margin-bottom:7px; font-weight:700 }
    .target-id { color:var(--muted); font-size:10px; overflow-wrap:anywhere }
    .topbar { position:fixed; z-index:15; top:0; left:var(--nav); right:0; height:var(--header); display:flex; align-items:center; justify-content:space-between; padding:0 24px 0 28px; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(12px) }
    .run-context { min-width:0 }
    .crumbs { display:flex; align-items:center; gap:7px; color:var(--muted); font-size:11px; margin-bottom:3px }
    .crumbs b { color:var(--blue) }
    .run-name { max-width:600px; font-size:16px; font-weight:780; letter-spacing:-.015em }
    .top-actions { display:flex; align-items:center; gap:9px }
    .elapsed { min-width:92px; padding-right:14px; margin-right:3px; border-right:1px solid var(--line); text-align:right }
    .elapsed strong { display:block; font:700 13px/1.2 var(--mono) }
    .elapsed span { color:var(--muted); font-size:10px }
    .btn { min-height:40px; display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:0 14px; border:1px solid var(--line-strong); border-radius:7px; color:#334155; background:#fff; font-weight:750; cursor:pointer; box-shadow:0 1px 1px rgba(15,23,42,.03) }
    .btn:hover:not(:disabled) { background:var(--surface-subtle); border-color:#94a3b8 }
    .btn.primary { color:#fff; background:var(--blue); border-color:var(--blue) }
    .btn.primary:hover:not(:disabled) { background:var(--blue-dark); border-color:var(--blue-dark) }
    .btn:disabled { cursor:not-allowed; opacity:.48 }
    .btn svg { width:16px; height:16px }
    .main { margin-left:var(--nav); padding:calc(var(--header) + 24px) 28px 36px }
    .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin:0 0 20px }
    .page-head h1 { margin:3px 0 4px; font-size:24px; line-height:1.18; letter-spacing:-.035em }
    .page-head p { margin:0; color:var(--muted) }
    .page-tools { display:flex; align-items:center; gap:8px }
    .live-pill,.pill { display:inline-flex; align-items:center; gap:6px; white-space:nowrap; border:1px solid transparent; border-radius:99px; font-size:11px; font-weight:750 }
    .live-pill { min-height:30px; padding:0 10px; color:var(--green); background:var(--green-soft); border-color:#bbf7d0 }
    .dot { width:7px; height:7px; border-radius:50%; background:currentColor }
    .dot.pulse { box-shadow:0 0 0 0 rgba(5,150,105,.25); animation:pulse 1.8s infinite }
    @keyframes pulse { 70% { box-shadow:0 0 0 6px rgba(5,150,105,0) } 100% { box-shadow:0 0 0 0 rgba(5,150,105,0) } }
    .grid { display:grid; gap:16px }
    .stats { grid-template-columns:repeat(5,minmax(0,1fr)); margin-bottom:16px }
    .stat { min-height:104px; padding:17px 18px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow) }
    .stat-top { display:flex; align-items:center; justify-content:space-between; color:var(--muted); font-size:11px; font-weight:700 }
    .stat-icon { width:29px; height:29px; display:grid; place-items:center; border-radius:7px; color:var(--blue); background:var(--blue-soft) }
    .stat-icon svg { width:15px; height:15px }
    .stat-value { margin-top:9px; font-size:25px; line-height:1; font-weight:800; letter-spacing:-.04em }
    .stat-detail { margin-top:6px; color:var(--muted); font-size:11px }
    .panel { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden }
    .panel-head { min-height:56px; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:0 17px; border-bottom:1px solid var(--line) }
    .panel-title { font-weight:780; letter-spacing:-.01em }
    .panel-title small { display:block; margin-top:2px; color:var(--muted); font-size:10px; font-weight:500 }
    .panel-link { color:var(--blue); font-size:11px; font-weight:750 }
    .agent-section { margin-bottom:16px }
    .agent-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; padding:14px }
    .agent-card { position:relative; min-width:0; padding:14px; border:1px solid var(--line); border-radius:8px; background:#fff; transition:border-color .15s,box-shadow .15s,transform .15s }
    .agent-card:hover { border-color:#bfdbfe; box-shadow:0 7px 18px rgba(37,99,235,.07); transform:translateY(-1px) }
    .agent-card::before { content:""; position:absolute; left:0; top:13px; bottom:13px; width:3px; border-radius:0 3px 3px 0; background:var(--agent) }
    .agent-top { display:flex; align-items:center; gap:9px; min-width:0 }
    .agent-avatar { width:30px; height:30px; display:grid; place-items:center; flex:none; color:#fff; background:var(--agent); border-radius:8px; font-size:10px; font-weight:850; letter-spacing:-.02em }
    .agent-name { min-width:0; font-size:12px; font-weight:800 }
    .agent-role { color:var(--muted); font-size:10px }
    .agent-state { margin-left:auto; width:8px; height:8px; flex:none; border-radius:50%; background:var(--green) }
    .agent-current { height:32px; margin:12px 0 10px; color:#334155; font:10px/1.45 var(--mono); overflow:hidden }
    .progress { height:4px; overflow:hidden; border-radius:99px; background:#e8edf3 }
    .progress > i { display:block; height:100%; border-radius:inherit; background:var(--agent) }
    .agent-meta { display:flex; justify-content:space-between; gap:8px; margin-top:8px; color:var(--muted); font-size:10px }
    .agent-alert { color:var(--amber); font-weight:750 }
    .room-grid { grid-template-columns:minmax(0,1.62fr) minmax(300px,.7fr); align-items:start }
    .table-wrap { overflow:auto }
    table { width:100%; border-collapse:collapse }
    th { height:38px; padding:0 12px; color:var(--muted); background:var(--surface-subtle); border-bottom:1px solid var(--line); font-size:10px; font-weight:780; letter-spacing:.04em; text-align:left; text-transform:uppercase; white-space:nowrap }
    td { height:46px; padding:7px 12px; border-bottom:1px solid #edf1f5; color:#334155; font-size:11px; vertical-align:middle }
    tbody tr:last-child td { border-bottom:0 }
    tbody tr:hover { background:#fbfdff }
    .op-id { color:var(--blue); font-weight:750 }
    .op-target { max-width:390px; font-family:var(--mono); font-size:10px }
    .agent-chip { display:inline-flex; align-items:center; gap:5px; font-weight:750 }
    .agent-chip i { width:7px; height:7px; border-radius:2px; background:var(--agent) }
    .pill { padding:3px 7px; background:#f1f5f9; border-color:#e2e8f0; color:#475569 }
    .pill.success { color:var(--green); background:var(--green-soft); border-color:#bbf7d0 }
    .pill.warning { color:var(--amber); background:var(--amber-soft); border-color:#fde68a }
    .pill.danger { color:var(--red); background:var(--red-soft); border-color:#fecaca }
    .pill.blue { color:var(--blue); background:var(--blue-soft); border-color:#bfdbfe }
    .files-mini { padding:7px 14px 12px }
    .file-mini { min-height:50px; display:grid; grid-template-columns:20px minmax(0,1fr) auto; align-items:center; gap:9px; border-bottom:1px solid #edf1f5 }
    .file-mini:last-child { border-bottom:0 }
    .file-mini svg { width:16px; height:16px; color:var(--muted) }
    .file-name { font:10px/1.4 var(--mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .file-why { color:var(--muted); font-size:10px; margin-top:2px }
    .avatars { display:flex; padding-left:6px }
    .tiny-avatar { width:20px; height:20px; display:grid; place-items:center; margin-left:-6px; color:#fff; background:var(--agent); border:2px solid #fff; border-radius:50%; font-size:7px; font-weight:850 }
    .collab-grid { grid-template-columns:repeat(3,minmax(0,1fr)); margin-bottom:16px }
    .collab-card { min-width:0; min-height:156px; display:flex; flex-direction:column; padding:16px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); transition:border-color .18s,box-shadow .18s,transform .18s }
    .collab-card:hover { border-color:#bfdbfe; box-shadow:0 10px 24px rgba(37,99,235,.08); transform:translateY(-1px) }
    .collab-card-top { display:flex; align-items:center; justify-content:space-between; gap:10px }
    .collab-card-top svg { width:18px; height:18px; color:var(--blue) }
    .collab-card h3 { margin:13px 0 4px; font:750 13px/1.35 var(--mono); overflow-wrap:anywhere }
    .collab-card p { margin:0; color:var(--muted); font-size:10px }
    .collab-card-foot { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-top:auto; padding-top:14px }
    .collab-count { text-align:right }
    .collab-count b { display:block; font-size:18px; line-height:1 }
    .collab-count span { color:var(--muted); font-size:9px }
    .notice { display:flex; align-items:flex-start; gap:10px; margin-bottom:16px; padding:12px 14px; border:1px solid #bfdbfe; border-radius:8px; color:#1e3a8a; background:var(--blue-soft) }
    .notice svg { width:18px; height:18px; margin-top:1px }
    .notice strong { display:block; color:#1e40af; font-size:11px }
    .notice span { color:#475569; font-size:11px }
    .toolbar { min-height:58px; display:flex; align-items:center; flex-wrap:wrap; gap:9px; padding:9px 14px; border-bottom:1px solid var(--line); background:#fff }
    .field { position:relative; min-width:150px }
    .field.search { flex:1; min-width:240px }
    .field input,.field select { width:100%; min-height:36px; padding:0 11px; color:#334155; background:#fff; border:1px solid var(--line-strong); border-radius:7px; outline:0 }
    .field input { padding-left:34px }
    .field svg { position:absolute; left:11px; top:10px; width:15px; height:15px; color:var(--muted) }
    .result-count { margin-left:auto; color:var(--muted); font-size:11px }
    .agent-detail-grid { grid-template-columns:minmax(0,1.55fr) 340px; align-items:start }
    .hero-agent { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:14px; padding:18px; margin-bottom:16px }
    .hero-avatar { width:48px; height:48px; display:grid; place-items:center; border-radius:12px; color:#fff; background:var(--agent); font-weight:850 }
    .hero-agent h2 { margin:0 0 3px; font-size:18px }
    .hero-agent p { margin:0; color:var(--muted); font-size:11px }
    .hero-numbers { display:flex; gap:22px; text-align:right }
    .hero-numbers b { display:block; font-size:18px }
    .hero-numbers span { color:var(--muted); font-size:10px }
    .timeline { padding:10px 16px 16px }
    .timeline-row { position:relative; display:grid; grid-template-columns:74px 16px minmax(0,1fr) auto; gap:10px; min-height:58px; padding:8px 0 }
    .timeline-row:not(:last-child)::after { content:""; position:absolute; left:82px; top:30px; bottom:-10px; width:1px; background:var(--line) }
    .timeline-id { color:var(--muted); font:10px/1.4 var(--mono); text-align:right }
    .timeline-node { position:relative; z-index:1; width:10px; height:10px; margin-top:3px; border:2px solid #fff; border-radius:50%; background:var(--blue); box-shadow:0 0 0 2px #bfdbfe }
    .timeline-main b { display:block; font-size:11px }
    .timeline-main code { display:block; margin-top:3px; color:var(--muted); font:10px/1.45 var(--mono); overflow-wrap:anywhere }
    .context-stack { display:grid; gap:16px }
    .context-body { padding:14px 16px }
    .kv { display:grid; grid-template-columns:95px minmax(0,1fr); gap:9px; padding:8px 0; border-bottom:1px solid #edf1f5; font-size:11px }
    .kv:last-child { border-bottom:0 }
    .kv dt { color:var(--muted) }
    .kv dd { margin:0; overflow-wrap:anywhere }
    .file-layout { display:grid; grid-template-columns:310px minmax(0,1fr); min-height:690px }
    .file-browser { border-right:1px solid var(--line); background:#fbfcfe }
    .file-browser .toolbar { padding:10px; background:#fbfcfe }
    .tree { padding:8px; max-height:620px; overflow:auto }
    .tree-group { margin-bottom:5px }
    .tree-label { display:flex; align-items:center; gap:6px; min-height:29px; padding:0 6px; color:#475569; font-size:11px; font-weight:720 }
    .tree-label svg { width:14px; height:14px; color:var(--muted) }
    .tree-files { margin-left:14px; padding-left:8px; border-left:1px solid var(--line) }
    .tree-file { min-height:31px; display:flex; align-items:center; gap:7px; padding:0 7px; border-radius:5px; color:#475569; font:10px/1.3 var(--mono) }
    .tree-file:hover { background:#f1f5f9 }
    .tree-file.active { color:var(--blue); background:var(--blue-soft); font-weight:750 }
    .tree-file .mark { width:6px; height:6px; margin-left:auto; border-radius:50%; background:var(--green) }
    .source-head { min-height:70px; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:12px 16px; border-bottom:1px solid var(--line) }
    .source-head h2 { margin:0 0 4px; font:700 13px/1.2 var(--mono) }
    .source-meta { display:flex; flex-wrap:wrap; gap:5px }
    .ownership-split { display:flex; gap:18px; align-items:flex-start }
    .ownership-block { min-width:130px }
    .ownership-block label { display:block; margin-bottom:4px; color:var(--muted); font-size:9px; font-weight:800; letter-spacing:.05em; text-transform:uppercase }
    .source { margin:0; padding:10px 0; background:#fbfcfe; border-bottom:1px solid var(--line); overflow:auto; font:11px/1.72 var(--mono) }
    .source-line { min-width:max-content; display:grid; grid-template-columns:44px 86px minmax(620px,1fr); min-height:22px }
    .source-line:hover { background:#f1f5f9 }
    .line-no { padding-right:10px; color:var(--muted-2); text-align:right; user-select:none }
    .blame-owner { display:flex; align-items:center; gap:5px; padding-left:9px; border-left:3px solid var(--agent,#cbd5e1); color:#475569; font-size:9px }
    .line-code { padding:0 14px; white-space:pre }
    .source-empty { display:grid; place-items:center; min-height:300px; color:var(--muted); text-align:center }
    .provenance { display:flex; align-items:center; gap:8px; min-height:42px; padding:0 16px; color:var(--muted); background:#fff; font-size:10px }
    .provenance svg { width:15px; height:15px; color:var(--blue) }
    .conflict-layout { display:grid; grid-template-columns:270px minmax(0,1fr); min-height:700px }
    .conflict-list { border-right:1px solid var(--line); background:#fbfcfe }
    .conflict-item { display:block; padding:14px; border-bottom:1px solid var(--line); background:#fff }
    .conflict-item.active { background:var(--amber-soft); box-shadow:inset 3px 0 var(--amber) }
    .conflict-item strong { display:block; margin:7px 0 3px; font-size:11px }
    .conflict-item code { color:var(--muted); font:9px/1.4 var(--mono) }
    .conflict-main { padding:18px }
    .conflict-title { display:flex; align-items:flex-start; justify-content:space-between; gap:15px; margin-bottom:16px }
    .conflict-title h2 { margin:4px 0; font-size:19px }
    .conflict-title p { margin:0; color:var(--muted); font-size:11px }
    .sequence { display:flex; align-items:center; gap:0; padding:14px 16px; margin-bottom:16px; overflow:auto; background:#fff; border:1px solid var(--line); border-radius:8px }
    .seq-step { min-width:105px; text-align:center }
    .seq-dot { width:24px; height:24px; display:grid; place-items:center; margin:0 auto 7px; border-radius:50%; color:#fff; background:var(--green); font-size:10px; font-weight:800 }
    .seq-step.warning .seq-dot { background:var(--amber) }
    .seq-step b { display:block; font-size:9px }
    .seq-step span { color:var(--muted); font-size:8px }
    .seq-line { min-width:24px; height:1px; margin-top:-22px; flex:1; background:var(--line-strong) }
    .compare { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px }
    .compare-card { border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#fff }
    .compare-card.winner { border-color:#a7f3d0 }
    .compare-card.rejected { border-color:#fecaca }
    .compare-head { display:flex; align-items:center; justify-content:space-between; min-height:45px; padding:0 13px; border-bottom:1px solid var(--line); font-size:11px; font-weight:750 }
    .code-block { min-height:145px; margin:0; padding:13px; color:#334155; background:#fbfcfe; font:10px/1.6 var(--mono); white-space:pre-wrap; overflow:auto }
    .resolution { display:grid; grid-template-columns:minmax(0,1fr) 260px; gap:12px }
    .resolution-copy { padding:15px; color:#065f46; background:var(--green-soft); border:1px solid #a7f3d0; border-radius:8px }
    .resolution-copy strong { display:block; margin-bottom:5px; font-size:11px }
    .resolution-copy p { margin:0; font-size:11px }
    .checks { padding:12px; border:1px solid var(--line); border-radius:8px; background:#fff }
    .check { display:flex; align-items:center; gap:7px; padding:5px 0; color:#475569; font-size:10px }
    .check svg { width:14px; height:14px; color:var(--green) }
    .preview-shell { overflow:hidden; background:#e9eef5; border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow) }
    .browser-bar { height:52px; display:grid; grid-template-columns:90px minmax(0,1fr) 90px; align-items:center; gap:12px; padding:0 14px; background:#fff; border-bottom:1px solid var(--line) }
    .browser-dots { display:flex; gap:6px }
    .browser-dots i { width:9px; height:9px; border-radius:50%; background:#cbd5e1 }
    .address { height:30px; display:flex; align-items:center; gap:7px; padding:0 11px; color:var(--muted); background:var(--surface-subtle); border:1px solid var(--line); border-radius:6px; font:10px var(--mono); overflow:hidden }
    .address svg { width:13px; height:13px; color:var(--green) }
    .preview-frame { width:100%; height:690px; display:block; border:0; background:#fff }
    .evidence-grid { grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); margin-bottom:16px }
    .evidence-card { padding:15px; border:1px solid var(--line); border-radius:8px; background:#fff }
    .evidence-card b { display:block; margin:7px 0 2px; font-size:20px }
    .evidence-card span { color:var(--muted); font-size:10px }
    .join-flow { display:flex; align-items:center; justify-content:center; gap:9px; padding:22px; border-bottom:1px solid var(--line); background:#fbfcfe }
    .join-node { min-width:150px; padding:12px; text-align:center; background:#fff; border:1px solid var(--line); border-radius:7px }
    .join-node b { display:block; font:700 11px var(--mono) }
    .join-node span { color:var(--muted); font-size:9px }
    .join-arrow { color:var(--muted-2) }
    .empty { min-height:260px; display:grid; place-items:center; padding:32px; color:var(--muted); text-align:center }
    .empty-icon { width:42px; height:42px; display:grid; place-items:center; margin:0 auto 10px; color:var(--muted); background:#f1f5f9; border-radius:10px }
    .empty-icon svg { width:21px; height:21px }
    .empty strong { display:block; margin-bottom:4px; color:#334155 }
    .error-banner { display:flex; align-items:center; gap:9px; margin-bottom:16px; padding:11px 13px; color:#991b1b; background:var(--red-soft); border:1px solid #fecaca; border-radius:8px }
    .error-banner svg { width:17px; height:17px }
    .skeleton { background:linear-gradient(90deg,#eef2f6,#f8fafc,#eef2f6); background-size:200% 100%; animation:shimmer 1.5s infinite }
    @keyframes shimmer { to { background-position:-200% 0 } }
    @media(max-width:1360px) { .agent-grid { grid-template-columns:repeat(4,minmax(0,1fr)) } .stats { grid-template-columns:repeat(5,minmax(160px,1fr)); overflow:auto } }
    @media(max-width:1100px) {
      :root { --nav:200px }
      .brand { padding:0 15px }
      .brand-sub { font-size:10px }
      .main { padding-left:18px; padding-right:18px }
      .topbar { padding-left:18px; padding-right:16px }
      .run-name { max-width:260px }
      .elapsed { min-width:76px; padding-right:10px }
      .btn { padding:0 11px }
      .agent-grid { grid-template-columns:repeat(3,minmax(0,1fr)) }
      .collab-grid { grid-template-columns:repeat(2,minmax(0,1fr)) }
      .room-grid,.agent-detail-grid { grid-template-columns:1fr }
      .file-layout { grid-template-columns:230px minmax(0,1fr) }
      .source-head { align-items:flex-start; flex-wrap:wrap }
      .ownership-split { width:100% }
      .ownership-block { flex:1 }
      .conflict-layout { grid-template-columns:220px minmax(0,1fr) }
      .seq-step { min-width:50px }
      .seq-line { min-width:5px }
      .compare,.resolution { grid-template-columns:1fr }
      .join-node { min-width:112px }
    }
    @media(prefers-reduced-motion:reduce) { *,*::before,*::after { scroll-behavior:auto!important; animation-duration:.01ms!important; animation-iteration-count:1!important; transition-duration:.01ms!important } }
  </style>
</head>
<body>
  <div id="app" class="shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <div class="brand-mark" id="brand-icon"></div>
        <div><div class="brand-title">EphemeralOS</div><div class="brand-sub">Multi-Agent Control Room</div></div>
      </div>
      <div class="nav-label">Live run</div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot" id="sidebar-foot"></div>
    </aside>
    <header class="topbar" id="topbar"></header>
    <main class="main" id="view" tabindex="-1"><div class="empty"><div><div class="empty-icon skeleton"></div><strong>Connecting to presentation controller</strong><span>Loading live run evidence…</span></div></div></main>
  </div>
  <script>
  (() => {
    "use strict";
    const $ = (s, r=document) => r.querySelector(s);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const pct = (n,d) => d ? Math.max(0,Math.min(100,(n/d)*100)) : 0;
    const nfmt = (n) => Number.isFinite(Number(n)) ? Number(n).toLocaleString() : "—";
    const time = (ms) => { const s=Math.max(0,Math.round((ms||0)/1000)); const m=Math.floor(s/60); return `${String(m).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; };
    const hue = (id) => { let h=0; for(const c of String(id)) h=(h*31+c.charCodeAt(0))>>>0; return `hsl(${h%360} 62% 45%)`; };
    const short = (v,n=15) => v ? String(v).slice(0,n)+(String(v).length>n?"…":"") : "—";
    const icons = {
      mark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4h10l4 7-4 9H7l-4-9 4-7Z"/><path d="m8.5 13 2.2 2.2 4.8-5"/></svg>',
      room:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 17.5h7M17.5 14v7"/></svg>',
      agents:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3.5 19c.5-4 2.3-6 5.5-6s5 2 5.5 6"/><circle cx="17" cy="9" r="2"/><path d="M15.5 14c3.2-.6 5.1 1 5.5 4"/></svg>',
      operations:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h16"/><circle cx="8" cy="5" r="2" fill="white"/><circle cx="16" cy="12" r="2" fill="white"/><circle cx="10" cy="19" r="2" fill="white"/></svg>',
      files:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-10Z"/></svg>',
      conflict:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v5a4 4 0 0 0 4 4h5"/><path d="m18 9 3 3-3 3"/><path d="M12 21v-5a4 4 0 0 0-4-4H3"/><path d="m6 9-3 3 3 3"/></svg>',
      preview:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M7 6.5h.01M10 6.5h.01"/></svg>',
      evidence:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3h9l4 4v14H6z"/><path d="M14 3v5h5M9 12h7M9 16h7"/></svg>',
      play:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m8 5 11 7-11 7V5Z"/></svg>',
      reset:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v6h6"/><path d="M5.5 15a8 8 0 1 0 .5-7l-2 2"/></svg>',
      search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>',
      check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.5 2.5L16 9"/></svg>',
      info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v6M12 7h.01"/></svg>',
      alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 2.5 20h19L12 3Z"/><path d="M12 9v5M12 17h.01"/></svg>',
      lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>'
    };
    const navItems = [
      ["control","Control Room","room"],["agents","Agents","agents"],["operations","Operations","operations"],
      ["files","Files","files"],["conflicts","Conflicts","conflict"],["preview","Output Preview","preview"],["evidence","Evidence","evidence"]
    ];
    const ui = { opAgent:"", opType:"", opStatus:"", opSearch:"", fileSearch:"", fileMode:"collab", busy:"", error:"" };
    let state=null, disconnected=false, pollTimer=null, lastFingerprint="";

    function route() {
      const raw=(location.hash||"#control").slice(1); const [name,...rest]=raw.split("/");
      return {name:navItems.some(x=>x[0]===name)?name:"control", detail:decodeURIComponent(rest.join("/"))};
    }
    function phaseLabel(p) { return ({passed:"Run completed",running:"Run in progress",ready:"Ready to run",resetting:"Resetting workspace",failed:"Run failed"})[p]||p||"Connecting"; }
    function statusPill(status,label) {
      const cls=status==="completed"||status==="passed"||status==="retried_successfully"?"success":status==="rejected"||status==="conflict_resolved"?"warning":status==="failed"?"danger":"blue";
      return `<span class="pill ${cls}">${esc(label||String(status||"").replaceAll("_"," "))}</span>`;
    }
    function agentChip(id) { return id ? `<span class="agent-chip" style="--agent:${hue(id)}"><i></i>${esc(id)}</span>` : '<span class="muted">—</span>'; }
    function avatars(ids,max=4) { const list=(ids||[]).slice(0,max); return `<span class="avatars">${list.map(id=>`<i class="tiny-avatar" title="${esc(id)}" style="--agent:${hue(id)}">${esc(id.slice(1))}</i>`).join("")}${(ids||[]).length>max?`<i class="tiny-avatar" style="--agent:#64748b">+${(ids||[]).length-max}</i>`:""}</span>`; }
    function empty(title,copy,icon="info") { return `<div class="empty"><div><div class="empty-icon">${icons[icon]}</div><strong>${esc(title)}</strong><span>${esc(copy)}</span></div></div>`; }
    function collaborationFiles(files) {
      const priority={"src/app.js":0,"src/registry.js":1,"index.html":2,"src/config.js":3};
      return (files||[]).filter(f=>f.collaboration_surface).sort((a,b)=>(priority[a.path]??20)-(priority[b.path]??20)||(b.collaboration_agents||[]).length-(a.collaboration_agents||[]).length||a.path.localeCompare(b.path));
    }

    function chrome() {
      const r=route(), agents=state?.agents||[], conflicts=state?.conflicts||[], collab=collaborationFiles(state?.files||[]);
      $("#brand-icon").innerHTML=icons.mark;
      $("#nav").innerHTML=navItems.map(([id,label,icon])=>{
        const count=id==="agents"?agents.length:id==="operations"?(state?.operations||[]).length:id==="files"?collab.length:id==="conflicts"?conflicts.length:"";
        return `<a href="#${id}" class="${r.name===id?"active":""}">${icons[icon]}<span>${label}</span>${count!==""?`<span class="nav-badge">${nfmt(count)}</span>`:""}</a>`;
      }).join("");
      const live=state?.phase==="running", connected=!disconnected&&!!state;
      $("#sidebar-foot").innerHTML=`<div class="target-card"><div class="target-row"><span class="dot ${live?"pulse":""}" style="color:${connected?"var(--green)":"var(--red)"}"></span>${connected?"Controller connected":"Controller disconnected"}</div><div class="target-id mono" title="${esc(state?.sandbox_id)}">${esc(state?.sandbox_id||"Awaiting target")}</div></div>`;
      const title=navItems.find(x=>x[0]===r.name)?.[1]||"Control Room";
      const runName=state?.run_title||state?.run_id||"EphemeralOS presentation run";
      $("#topbar").innerHTML=`
        <div class="run-context"><div class="crumbs"><b>Live run</b><span>/</span><span>${esc(title)}</span></div><div class="run-name truncate">${esc(runName)}</div></div>
        <div class="top-actions">
          <div class="elapsed"><strong>${time(state?.elapsed_ms)}</strong><span>${phaseLabel(state?.phase)}</span></div>
          <button class="btn" data-action="reset" ${!state?.can_reset||ui.busy?"disabled":""}>${icons.reset}<span>${ui.busy==="reset"?"Resetting…":"Reset workspace"}</span></button>
          <button class="btn primary" data-action="run" ${!state?.can_run||ui.busy?"disabled":""}>${icons.play}<span>${ui.busy==="run"?"Starting…":"Run demo"}</span></button>
        </div>`;
    }

    function pageHead(title,copy,extra="") { return `<div class="page-head"><div><div class="eyebrow">EphemeralOS / live evidence</div><h1>${esc(title)}</h1><p>${esc(copy)}</p></div><div class="page-tools">${extra}${state?.phase?`<span class="live-pill"><i class="dot ${state.phase==="running"?"pulse":""}"></i>${esc(phaseLabel(state.phase))}</span>`:""}</div></div>`; }
    function agentCard(a) {
      const current=a.last_operation; const progress=pct(a.completed,a.planned);
      return `<a class="agent-card" href="#agents/${encodeURIComponent(a.id)}" style="--agent:${hue(a.id)}">
        <div class="agent-top"><div class="agent-avatar">${esc(a.id)}</div><div class="truncate"><div class="agent-name">${esc(a.id)}</div><div class="agent-role truncate">${esc(a.role)}</div></div><i class="agent-state" title="${esc(a.state)}" style="background:${a.state==="completed"?"var(--green)":a.state==="active"?"var(--blue)":"var(--muted-2)"}"></i></div>
        <div class="agent-current">${current?`${esc(current.action)} · ${esc(current.target)}`:"Awaiting operation evidence"}</div>
        <div class="progress"><i style="width:${progress}%"></i></div>
        <div class="agent-meta"><span>${nfmt(a.completed)} / ${nfmt(a.planned)} ops</span><span class="${a.conflicts?"agent-alert":""}">${a.conflicts?`${nfmt(a.conflicts)} conflict`: `${nfmt(a.files_touched)} files`}</span></div>
      </a>`;
    }
    function opRows(ops) {
      if(!ops.length) return `<tr><td colspan="7">${empty("No operations match","Try changing the current filters.","operations")}</td></tr>`;
      return ops.map(o=>`<tr><td><a class="op-id mono" href="#agents/${encodeURIComponent(o.agent)}">${esc(o.id)}</a></td><td>${agentChip(o.agent)}</td><td><span class="pill">${esc(o.operation)}</span></td><td><div class="op-target truncate" title="${esc(o.target)}">${esc(o.target)}</div></td><td class="mono">${o.workspace_id?esc(short(o.workspace_id,10)):"—"}</td><td>${o.ms==null?"—":`${nfmt(o.ms)} ms`}</td><td>${statusPill(o.status)}</td></tr>`).join("");
    }
    function operationsTable(ops,compact=false) { return `<div class="table-wrap"><table><thead><tr><th>Operation</th><th>Agent</th><th>Tool</th><th>Command / target</th><th>Workspace</th><th>Duration</th><th>Result</th></tr></thead><tbody>${opRows(ops)}</tbody></table></div>${compact?"":`<div class="provenance">${icons.info}<span>Every row is one recorded host-side sandbox CLI process. Expandable raw evidence is available from the Evidence view.</span></div>`}`; }

    function controlView() {
      const agents=state.agents||[], ops=state.operations||[], files=state.files||[], conflicts=state.conflicts||[];
      const completedAgents=agents.filter(a=>a.state==="completed").length, resolved=conflicts.filter(c=>["retried_successfully","winner_preserved"].includes(c.state)).length;
      const importantFiles=collaborationFiles(files).slice(0,5);
      return `${pageHead("Control Room","One coordinated sandbox, independent agent workspaces, and evidence for every published result.")}
        ${state.error||ui.error?`<div class="error-banner">${icons.alert}<span>${esc(state.error||ui.error)}</span></div>`:""}
        <section class="grid stats" aria-label="Run summary">
          ${stat("agents",agents.length,"Participating agents",`${completedAgents} completed`)}
          ${stat("operations",state.completed,"CLI operations",`${nfmt(state.completed)} of ${nfmt(state.planned)} recorded`)}
          ${stat("files",importantFiles.length,"Collaboration surfaces",`${nfmt(files.length)} changed paths retained as evidence`)}
          ${stat("conflict",conflicts.length,"Conflicts detected",`${resolved} resolved with evidence`)}
          ${stat("evidence",state.latest_revision,"Published revision",state.execution_verdict||phaseLabel(state.phase))}
        </section>
        <section class="panel agent-section"><div class="panel-head"><div class="panel-title">Agent constellation<small>Independent workers sharing one published workspace</small></div><a class="panel-link" href="#agents">View all agents →</a></div><div class="agent-grid">${agents.length?agents.map(agentCard).join(""):empty("No agents yet","Reset the workspace, then run the demo to populate live agents.","agents")}</div></section>
        <section class="grid room-grid">
          <div class="panel"><div class="panel-head"><div class="panel-title">Live operation stream<small>${nfmt(ops.length)} authored CLI records from the host runner</small></div><a class="panel-link" href="#operations">Explore all operations →</a></div>${operationsTable(ops.slice(-14).reverse(),true)}</div>
          <div class="panel"><div class="panel-head"><div class="panel-title">Collaboration surfaces<small>Large integration points that connect agent contributions</small></div><a class="panel-link" href="#files">Open collaboration view →</a></div><div class="files-mini">${importantFiles.length?importantFiles.map(fileMini).join(""):empty("No collaboration surfaces yet","Linked agent work appears here as source evidence arrives.","files")}</div></div>
        </section>`;
    }
    function stat(icon,value,label,detail) { return `<article class="stat"><div class="stat-top"><span>${esc(label)}</span><i class="stat-icon">${icons[icon]}</i></div><div class="stat-value">${nfmt(value)}</div><div class="stat-detail">${esc(detail)}</div></article>`; }
    function fileMini(f) { const ids=f.collaboration_agents||[]; return `<a class="file-mini" href="#files/${encodeURIComponent(f.path)}">${icons.files}<div class="truncate"><div class="file-name">${esc(f.path)}</div><div class="file-why">${nfmt(ids.length)} agents connected by ownership, edits, or module links</div></div>${avatars(ids)}</a>`; }

    function agentsView(detail) {
      const agents=state.agents||[]; if(detail) { const a=agents.find(x=>x.id===detail); if(a) return agentDetail(a); }
      return `${pageHead("Agents","Move from the whole run into each agent’s operations, workspaces, files, publications, and conflicts.")}
        <div class="notice">${icons.info}<div><strong>Explicit identities, not inferred prefixes</strong><span>Agent display identity comes from runner metadata joined to workspace sessions and operation records.</span></div></div>
        <section class="panel"><div class="panel-head"><div class="panel-title">Participating agents<small>${nfmt(agents.length)} identities supplied by this run</small></div></div><div class="agent-grid">${agents.map(agentCard).join("")||empty("No agents available","Run evidence has not been loaded.","agents")}</div></section>`;
    }
    function agentDetail(a) {
      const ops=(state.operations||[]).filter(o=>o.agent===a.id).reverse(); const files=(state.files||[]).filter(f=>(f.attempted_by||[]).includes(a.id)); const conflicts=(state.conflicts||[]).filter(c=>c.winner_agent===a.id||c.rejected_agent===a.id);
      return `${pageHead(`${a.id} · ${a.role}`,"Focused evidence for one worker without losing global run context.",`<a class="btn" href="#agents">All agents</a>`)}
        <section class="panel hero-agent" style="--agent:${hue(a.id)}"><div class="hero-avatar">${esc(a.id)}</div><div><h2>${esc(a.role)}</h2><p>${statusPill(a.state)} &nbsp; ${nfmt(a.workspace_ids.length)} workspace session${a.workspace_ids.length===1?"":"s"}</p></div><div class="hero-numbers"><div><b>${nfmt(a.completed)}</b><span>operations</span></div><div><b>${nfmt(a.files_touched)}</b><span>files touched</span></div><div><b>${nfmt(a.publications)}</b><span>publications</span></div></div></section>
        <div class="grid agent-detail-grid">
          <section class="panel"><div class="panel-head"><div class="panel-title">Operation timeline<small>Newest evidence first</small></div><a class="panel-link" href="#operations">View in global timeline →</a></div><div class="timeline">${ops.length?ops.slice(0,36).map(timelineRow).join(""):empty("No operation evidence","This agent has not started.","operations")}</div></section>
          <aside class="context-stack">
            <section class="panel"><div class="panel-head"><div class="panel-title">Workspace context</div></div><div class="context-body"><dl>${kv("State",statusPill(a.state))}${kv("Workspaces",a.workspace_ids.map(id=>`<span class="mono">${esc(short(id,16))}</span>`).join("<br>")||"—")}${kv("Published files",nfmt(a.published_files))}${kv("Conflicts",nfmt(a.conflicts))}</dl></div></section>
            <section class="panel"><div class="panel-head"><div class="panel-title">File contribution</div><a class="panel-link" href="#files">All files →</a></div><div class="files-mini">${files.slice(0,9).map(fileMini).join("")||empty("No file effects","No changed paths were attributed.","files")}</div></section>
            ${conflicts.length?`<section class="panel"><div class="panel-head"><div class="panel-title">Conflict evidence</div></div><div class="files-mini">${conflicts.map(c=>`<a class="file-mini" href="#conflicts">${icons.conflict}<div><div class="file-name">${esc(c.path)}</div><div class="file-why">${esc(String(c.state).replaceAll("_"," "))}</div></div>${statusPill(c.state)}</a>`).join("")}</div></section>`:""}
          </aside>
        </div>`;
    }
    function kv(k,v) { return `<div class="kv"><dt>${esc(k)}</dt><dd>${v}</dd></div>`; }
    function timelineRow(o) { return `<div class="timeline-row"><div class="timeline-id">${esc(o.id)}</div><i class="timeline-node" style="background:${o.status==="rejected"?"var(--amber)":o.status==="failed"?"var(--red)":"var(--blue)"}"></i><div class="timeline-main"><b>${esc(o.action)} · ${esc(o.operation)}</b><code>${esc(o.target)}</code></div><div>${statusPill(o.status)}</div></div>`; }

    function operationsView() {
      const all=state.operations||[], agents=state.agents||[], types=Object.keys(state.operation_mix||{});
      const q=ui.opSearch.toLowerCase(); const filtered=all.filter(o=>(!ui.opAgent||o.agent===ui.opAgent)&&(!ui.opType||o.operation===ui.opType)&&(!ui.opStatus||o.status===ui.opStatus)&&(!q||[o.id,o.target,o.path,o.workspace_id,o.request_id].some(v=>String(v||"").toLowerCase().includes(q)))).reverse();
      return `${pageHead("Operations Explorer","Inspect every host-triggered sandbox CLI execution with its agent, workspace, duration, result, and effect evidence.")}
        <section class="panel"><div class="toolbar"><div class="field search">${icons.search}<input id="op-search" value="${esc(ui.opSearch)}" placeholder="Search command, path, workspace, or request ID" aria-label="Search operations"></div>
          <div class="field"><select id="op-agent" aria-label="Filter by agent"><option value="">All agents</option>${agents.map(a=>`<option ${ui.opAgent===a.id?"selected":""}>${esc(a.id)}</option>`).join("")}</select></div>
          <div class="field"><select id="op-type" aria-label="Filter by operation type"><option value="">All tools</option>${types.map(t=>`<option ${ui.opType===t?"selected":""}>${esc(t)}</option>`).join("")}</select></div>
          <div class="field"><select id="op-status" aria-label="Filter by result"><option value="">All results</option>${["completed","rejected","failed"].map(s=>`<option ${ui.opStatus===s?"selected":""}>${s}</option>`).join("")}</select></div>
          <span class="result-count">${nfmt(filtered.length)} matching records</span></div>${operationsTable(filtered.slice(0,160))}</section>`;
    }

    function filesView(detail) {
      const all=state.files||[], surfaces=collaborationFiles(all), q=ui.fileSearch.toLowerCase();
      const filtered=all.filter(f=>(!q||f.path.toLowerCase().includes(q))&&(ui.fileMode==="all"||(ui.fileMode==="collab"&&f.collaboration_surface)||(ui.fileMode==="multi"&&f.multi_agent)||(ui.fileMode==="blame"&&f.ownership_available)||(ui.fileMode==="content"&&typeof f.content==="string")));
      let selected=all.find(f=>f.path===detail); if(!selected) selected=all.find(f=>f.path==="src/app.js")||surfaces[0]||all.find(f=>f.ownership_available)||filtered[0];
      return `${pageHead("Collaboration Files","Focus on the larger integration surfaces where independently authored work becomes one published application.")}
        <section class="grid collab-grid">${surfaces.slice(0,3).map(collaborationCard).join("")||empty("No collaboration surfaces yet","The complete changed-path inventory remains available below.","files")}</section>
        <section class="panel file-layout"><aside class="file-browser"><div class="toolbar"><div class="field search">${icons.search}<input id="file-search" value="${esc(ui.fileSearch)}" placeholder="Filter file evidence" aria-label="Search files"></div><div class="field"><select id="file-mode" aria-label="Filter files"><option value="collab" ${ui.fileMode==="collab"?"selected":""}>Collaboration surfaces (${nfmt(surfaces.length)})</option><option value="content" ${ui.fileMode==="content"?"selected":""}>Source available</option><option value="multi" ${ui.fileMode==="multi"?"selected":""}>Multiple authors</option><option value="blame" ${ui.fileMode==="blame"?"selected":""}>Blame available</option><option value="all" ${ui.fileMode==="all"?"selected":""}>All changed paths (${nfmt(all.length)})</option></select></div></div><div class="tree">${fileTree(filtered,selected?.path)}</div></aside><div class="source-view">${selected?sourceView(selected):empty("No files match","Change the file filters or run the demo.","files")}</div></section>`;
    }
    function collaborationCard(f) {
      const ids=f.collaboration_agents||[], refs=f.referenced_agents||[];
      const why=f.path==="src/app.js"?`${nfmt(refs.length)} independently authored feature modules are composed here.`:f.path==="src/registry.js"?"Published line ownership records the shared agent registry.":f.path==="index.html"?"The published shell loads every agent-owned feature into one output.":"A shared boundary records coordinated edits and the published result.";
      return `<a class="collab-card" href="#files/${encodeURIComponent(f.path)}"><div class="collab-card-top">${icons.files}<span class="pill blue">collaboration surface</span></div><h3>${esc(f.path)}</h3><p>${esc(why)}</p><div class="collab-card-foot">${avatars(ids,10)}<div class="collab-count"><b>${nfmt(ids.length)}</b><span>connected agents</span></div></div></a>`;
    }
    function fileTree(files,selected) {
      if(!files.length) return empty("No matching files","Try another path or filter.","search");
      const groups=new Map(); for(const f of files){const parts=f.path.split("/"); const folder=parts.length>1?parts.slice(0,-1).join("/"):"workspace root"; if(!groups.has(folder))groups.set(folder,[]); groups.get(folder).push(f);}
      return [...groups.entries()].sort().map(([folder,items])=>`<div class="tree-group"><div class="tree-label">${icons.files}<span>${esc(folder)}</span><span class="muted">${items.length}</span></div><div class="tree-files">${items.sort((a,b)=>a.path.localeCompare(b.path)).map(f=>`<a class="tree-file ${f.path===selected?"active":""}" href="#files/${encodeURIComponent(f.path)}"><span class="truncate">${esc(f.path.split("/").pop())}</span>${f.conflict?'<i class="mark" style="background:var(--amber)" title="Conflict"></i>':f.multi_agent?'<i class="mark" style="background:var(--blue)" title="Multi-agent"></i>':""}</a>`).join("")}</div></div>`).join("");
    }
    function sourceView(f) {
      const published=f.published_by||[], attempted=f.attempted_by||[], referenced=f.referenced_agents||[], connected=f.collaboration_agents||[], lines=typeof f.content==="string"?f.content.split("\n"):[];
      const contentEvidence=f.content_provenance==="sandbox_file_read"?"Sandbox file_read":f.content_provenance==="authored_file_write"?"Successful authored file_write":"Not sampled";
      return `<div class="source-head"><div><h2>${esc(f.path)}</h2><div class="source-meta">${statusPill(f.status)} ${f.collaboration_surface?'<span class="pill blue">collaboration surface</span>':""}</div></div><div class="ownership-split"><div class="ownership-block"><label>Published owners</label>${published.length?avatars(published,10):'<span class="muted">No blame sample</span>'}</div><div class="ownership-block"><label>Attempted edits</label>${attempted.length?avatars(attempted,10):'<span class="muted">None recorded</span>'}</div><div class="ownership-block"><label>Connected agents</label>${connected.length?avatars(connected,10):'<span class="muted">None linked</span>'}</div></div></div>
        ${lines.length?`<pre class="source" aria-label="Source with line ownership">${lines.map((line,i)=>sourceLine(f,i+1,line)).join("")}</pre>`:`<div class="source-empty"><div><strong>Source content is not sampled for this path</strong><br><span>Effect and publication evidence remain available.</span></div></div>`}
        <div class="provenance">${icons.info}<span><strong>Attribution remains evidence-specific.</strong> Owners come from sandbox blame joined to runner metadata; connected agents additionally include explicit feature-module references in the sampled source.</span></div>
        <div class="context-body"><dl>${kv("Operations",(f.operation_ids||[]).slice(0,12).map(id=>`<span class="mono">${esc(id)}</span>`).join(", ")||"—")}${kv("Source evidence",contentEvidence)}${kv("Module links",referenced.length?referenced.map(agentChip).join(" "):"No agent module references detected")}${kv("Published",f.present_in_final?"Present in final manifest":"Not present in final manifest")}${f.conflict?kv("Resolution",'<a class="panel-link" href="#conflicts">Open conflict evidence →</a>'):""}</dl></div>`;
    }
    function sourceLine(f,n,line) { const owner=(f.blame||[]).find(b=>n>=Number(b.start_line)&&n<Number(b.start_line)+Number(b.line_count)); const id=owner?.agent_id; const color=id?hue(id):"#cbd5e1"; return `<span class="source-line"><span class="line-no">${n}</span><span class="blame-owner" style="--agent:${color}" title="${esc(owner?.raw_owner||"No line-level blame sample")}">${esc(owner?.label||"no blame")}</span><span class="line-code">${esc(line)||" "}</span></span>`; }

    function conflictsView() {
      const conflicts=state.conflicts||[]; if(!conflicts.length) return `${pageHead("Conflict Resolver","Publication contention and resolution evidence are shown only when the backend records them.")}${empty("No conflicts recorded","This run has no rejected or stale publication evidence.","conflict")}`;
      const c=conflicts[0]; const steps=[
        ["Concurrent edits",`${c.winner_agent||"winner"} + ${c.rejected_agent||"stale"}`,""],
        ["Publish attempt",c.rejected_publish_operation,"warning"],["Conflict detected",c.type,"warning"],
        ["Winner preserved",c.winner_publish_operation,""],["Retry isolated",c.retry_operation,""],["Final verified",`revision ${c.retry_revision??c.winner_revision??"—"}`,""]
      ];
      return `${pageHead("Conflict Resolver","Trace contention from concurrent workspaces through rejection, winner preservation, retry, and final verification.")}
        <section class="panel conflict-layout"><aside class="conflict-list"><div class="panel-head"><div class="panel-title">Recorded conflicts<small>${nfmt(conflicts.length)} evidence-backed item${conflicts.length===1?"":"s"}</small></div></div>${conflicts.map(x=>`<a class="conflict-item active" href="#conflicts">${statusPill(x.state)}<strong>${esc(x.path)}</strong><code>${esc(x.id)}</code></a>`).join("")}</aside>
        <div class="conflict-main"><div class="conflict-title"><div><div class="eyebrow">${esc(c.type)}</div><h2>${esc(c.path)}</h2><p>${agentChip(c.winner_agent)} winner &nbsp;·&nbsp; ${agentChip(c.rejected_agent)} rejected stale attempt</p></div>${statusPill(c.state)}</div>
          <div class="sequence">${steps.map((s,i)=>`${i?'<i class="seq-line"></i>':''}<div class="seq-step ${s[2]}"><i class="seq-dot">${i+1}</i><b>${esc(s[0])}</b><span>${esc(s[1]||"—")}</span></div>`).join("")}</div>
          <div class="compare"><section class="compare-card winner"><div class="compare-head"><span>Published winner · ${esc(c.winner_agent||"unknown")}</span>${statusPill("completed","preserved")}</div><pre class="code-block">${esc(c.published_content||"Published content was not sampled.")}</pre></section><section class="compare-card rejected"><div class="compare-head"><span>Rejected attempt · ${esc(c.rejected_agent||"unknown")}</span>${statusPill("rejected")}</div><pre class="code-block">${esc(c.rejected_command||"Rejected command evidence was not sampled.")}</pre></section></div>
          <div class="resolution"><div class="resolution-copy"><strong>Resolution evidence</strong><p>${esc(c.resolution)}</p><p style="margin-top:7px"><span class="mono">${esc(c.rejected_publish_operation)}</span> was rejected; <span class="mono">${esc(c.retry_publish_operation||"no retry publish")}</span> records the follow-up.</p></div><div class="checks"><div class="eyebrow">Verification assertions</div>${Object.entries(c.checks||{}).map(([k,v])=>`<div class="check">${v?icons.check:icons.alert}<span>${esc(k.replaceAll("_"," "))}</span></div>`).join("")}</div></div>
        </div></section>`;
    }

    function previewView() {
      const url=state.urls?.presentation_preview||state.urls?.direct_preview||state.urls?.preview;
      return `${pageHead("Output Preview","The published application stays connected to the same sandbox, revision, operations, and attribution evidence.",url?`<a class="btn" href="${esc(url)}" target="_blank" rel="noopener">Open full view</a>`:"")}
        <div class="notice">${icons.info}<div><strong>Published revision ${esc(state.latest_revision??"unavailable")}</strong><span>${nfmt((state.agents||[]).filter(a=>a.published_files).length)} contributing agents are represented by the current output.</span></div></div>
        ${url?`<section class="preview-shell"><div class="browser-bar"><div class="browser-dots"><i></i><i></i><i></i></div><div class="address">${icons.lock}<span class="truncate">${esc(url)}</span></div><div></div></div><iframe class="preview-frame" src="${esc(url)}" title="Published sandbox application preview"></iframe></section>`:empty("Preview unavailable","The controller did not supply a published preview URL.","preview")}`;
    }

    function evidenceView() {
      const evidence=state.evidence||[], workspaces=state.workspaces||[]; const raw=[]; for(const f of state.files||[]) for(const b of f.blame||[]) raw.push({...b,path:f.path});
      return `${pageHead("Evidence & Provenance","Inspect the runner-side joins behind agent identity, workspace attribution, file effects, publication results, and blame.")}
        <section class="grid evidence-grid">${evidence.map(x=>`<article class="evidence-card"><div class="eyebrow">${esc(x.source)}</div><b>${nfmt(x.count)}</b><span>${esc(x.name)}</span></article>`).join("")}</section>
        <section class="panel" style="margin-bottom:16px"><div class="panel-head"><div class="panel-title">Attribution join<small>Identity remains explicit and provenance remains visible</small></div><span class="pill blue">${esc(state.mapping_provenance)}</span></div><div class="join-flow"><div class="join-node"><b>operation_id</b><span>host-authored CLI row</span></div><i class="join-arrow">→</i><div class="join-node"><b>workspace_session_id</b><span>sandbox workspace</span></div><i class="join-arrow">→</i><div class="join-node"><b>raw blame owner</b><span>sandbox file_blame</span></div><i class="join-arrow">→</i><div class="join-node"><b>agent_id</b><span>runner metadata join</span></div></div></section>
        <div class="grid room-grid"><section class="panel"><div class="panel-head"><div class="panel-title">Workspace → agent mapping<small>${nfmt(workspaces.length)} explicit session joins</small></div></div><div class="table-wrap"><table><thead><tr><th>Agent</th><th>Workspace session</th><th>Mapping provenance</th></tr></thead><tbody>${workspaces.map(w=>`<tr><td>${agentChip(w.agent_id)}</td><td class="mono">${esc(w.workspace_id)}</td><td><span class="pill blue">runner metadata</span></td></tr>`).join("")}</tbody></table></div></section>
        <section class="panel"><div class="panel-head"><div class="panel-title">Raw blame samples<small>Unmapped ownership is never guessed</small></div></div><div class="table-wrap"><table><thead><tr><th>Path</th><th>Raw owner</th><th>Display owner</th></tr></thead><tbody>${raw.map(b=>`<tr><td class="mono">${esc(b.path)}</td><td class="mono" title="${esc(b.raw_owner)}">${esc(short(b.raw_owner,24))}</td><td>${b.agent_id?agentChip(b.agent_id):'<span class="pill">Base / bootstrap</span>'}</td></tr>`).join("")||'<tr><td colspan="3">No blame data available</td></tr>'}</tbody></table></div></section></div>`;
    }

    function render() {
      chrome(); const r=route(); let html;
      if(!state) html=empty("Connecting to controller","Waiting for live status and presentation evidence.");
      else if(r.name==="control") html=controlView();
      else if(r.name==="agents") html=agentsView(r.detail);
      else if(r.name==="operations") html=operationsView();
      else if(r.name==="files") html=filesView(r.detail);
      else if(r.name==="conflicts") html=conflictsView();
      else if(r.name==="preview") html=previewView();
      else html=evidenceView();
      $("#view").innerHTML=html;
    }

    async function control(path) {
      const isReset=path==="/api/reset";
      if(!confirm(isReset?"Replace the retained sandbox with a clean presentation workspace?":"Start the host-side multi-agent runner against the clean target?")) return;
      ui.busy=isReset?"reset":"run"; ui.error=""; render();
      try { const res=await fetch(path,{method:"POST",headers:{"X-Presentation-Control":"1"}}); const body=await res.json().catch(()=>({})); if(!res.ok) throw new Error(body.error||`Controller returned ${res.status}`); await refresh(); }
      catch(err){ ui.error=err.message||String(err); }
      finally { ui.busy=""; render(); }
    }
    async function refresh() {
      let changed=false;
      try {
        const res=await fetch("/api/status",{cache:"no-store"}); if(!res.ok) throw new Error(`status ${res.status}`);
        const next=await res.json();
        const fingerprint=JSON.stringify([next.phase,next.completed,next.elapsed_ms,next.sandbox_id,next.run_id,next.latest_revision,next.error,(next.files||[]).length,(next.conflicts||[]).length]);
        changed=fingerprint!==lastFingerprint||disconnected; state=next; disconnected=false; lastFingerprint=fingerprint;
      }
      catch(err){ changed=!disconnected; disconnected=true; if(!state) ui.error=`Presentation controller unavailable: ${err.message||err}`; }
      if(changed) render();
    }
    function schedule() { clearTimeout(pollTimer); pollTimer=setTimeout(async()=>{ await refresh(); schedule(); }, state?.phase==="running"||state?.phase==="resetting"?850:2500); }
    document.addEventListener("click",e=>{ const b=e.target.closest("[data-action]"); if(b) control(`/api/${b.dataset.action}`); });
    document.addEventListener("input",e=>{ if(e.target.id==="op-search"){ui.opSearch=e.target.value; render(); requestAnimationFrame(()=>{$("#op-search")?.focus(); $("#op-search")?.setSelectionRange(ui.opSearch.length,ui.opSearch.length);});} if(e.target.id==="file-search"){ui.fileSearch=e.target.value; render(); requestAnimationFrame(()=>{$("#file-search")?.focus(); $("#file-search")?.setSelectionRange(ui.fileSearch.length,ui.fileSearch.length);});} });
    document.addEventListener("change",e=>{ if(e.target.id==="op-agent")ui.opAgent=e.target.value; if(e.target.id==="op-type")ui.opType=e.target.value; if(e.target.id==="op-status")ui.opStatus=e.target.value; if(e.target.id==="file-mode")ui.fileMode=e.target.value; render(); });
    addEventListener("hashchange",()=>{ render(); $("#view")?.focus({preventScroll:true}); scrollTo(0,0); });
    if(!location.hash) history.replaceState(null,"","#control");
    render(); refresh().then(schedule);
  })();
  </script>
</body>
</html>
