[pytest]
pythonpath = .

# -v: show each test as it runs.  --durations: per-test timing breakdown.
addopts = -ra -v --durations=0 --durations-min=0

# Live ("in-flight") logs: stream log records during each test instead of
# buffering to the end. Our CLI/gateway helpers log every operation + its
# elapsed time, so you see what is happening as it happens.
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s.%(msecs)03d %(levelname)s %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

markers =
    git: git policy end-to-end catalog
    whreserved: reserved .wh. namespace live catalog
    export: manager export_changes live catalog
    easy: easy git policy cases
    smoke: broader cross-family smoke tier
    squash: LayerStack squash live-Docker suite
    autosquash: internal LayerStack autosquash scheduler live-Docker suite
    medium: medium LayerStack squash cases
    complex: complex git policy cases
    hard: hard LayerStack squash cases
    bench: LayerStack squash sweep-width benchmark cases (A/B + PERF-WIDTH)
    runnable: runnable-project export round-trip cases (build → export → run)
    slow: tests that pull images or build large workspaces
    config: config family (serial; owns the gateway while it runs — deselect with -m "not config" in parallel lanes)
