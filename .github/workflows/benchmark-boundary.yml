name: Benchmark boundary

on:
  pull_request:
    paths:
      - "benchmark/**"
      - ".github/workflows/benchmark-boundary.yml"
  push:
    paths:
      - "benchmark/**"
      - ".github/workflows/benchmark-boundary.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: benchmark/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e './benchmark[test]'
      - run: python -m pytest -q benchmark/backend/tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: benchmark/web/package-lock.json
      - run: npm ci
        working-directory: benchmark/web
      - run: npm test
        working-directory: benchmark/web
      - run: npm run build -- --outDir "$RUNNER_TEMP/benchmark-web" --emptyOutDir
        working-directory: benchmark/web
